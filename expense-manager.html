<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Expense Manager - GDA Finance</title><style>body{margin:0;padding:20px;background:#eef3f8;font-family:Arial,sans-serif;}.card{max-width:500px;margin:auto;background:#fff;border-radius:15px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,.15);}.heading{text-align:center;font-size:22px;margin-bottom:20px;color:#dc3545;font-weight:bold;}input,select{width:100%;padding:12px;font-size:16px;border-radius:8px;border:1px solid #ccc;margin-bottom:15px;box-sizing:border-box;background:#f9f9f9;}button.save-btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:18px;cursor:pointer;font-weight:bold;background:#dc3545;color:white;margin-bottom:20px;}.expense-list{margin-top:10px;}.expense-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-bottom:10px;display:flex;justify-content:between;align-items:center;}.exp-details p{margin:0;font-size:14px;color:#334155;font-weight:bold;}.exp-details span{font-size:12px;color:#64748b;}.exp-actions button{padding:6px 10px;font-size:12px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-left:5px;}.btn-edit{background:#ffb703;color:black;}.btn-delete{background:#ef4444;color:white;}.back-btn{display:block;text-align:center;background:#475569;color:white;padding:12px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:15px;}</style></head><body><div class="card"><div class="heading">💸 खर्चे एंट्री व सुधार (Expense Manager)</div><form id="expenseForm" onsubmit="return false;"><input type="hidden" id="expenseId"><input type="number" id="expAmount" placeholder="खर्चे की राशि (Amount जैसे: 400)" required><input type="text" id="expTitle" placeholder="खर्चे का विवरण (Description जैसे: पेट्रोल, चाय)" required><input type="date" id="expDate" required><button type="button" id="btnSaveExpense" class="save-btn">💾 खर्चा सुरक्षित करें</button></form><h3>📋 आज और पुराने खर्चों की सूची</h3><div class="expense-list" id="expenseListContainer">⏳ खर्चे लोड हो रहे हैं...</div><a href="report.html" class="back-btn">⬅ रिपोर्ट पेज पर वापस जाएं</a></div><script type="module" src="expense-manager.js"></script></body></html>

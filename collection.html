<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Collection - GDA Finance</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #eef3f8;
            font-family: Arial, sans-serif;
        }
        .card {
            max-width: 450px;
            margin: auto;
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,.15);
        }
        .heading {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: #1565c0;
            font-weight: bold;
        }
        label {
            font-size: 14px;
            font-weight: bold;
            color: #444;
            display: block;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            box-sizing: border-box;
            background: #f9f9f9;
        }
        .customer-info-box {
            background: #f0f4f8;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid #1565c0;
            display: none;
        }
        .info-p {
            margin: 5px 0;
            font-size: 14px;
            color: #333;
        }
        button.collect-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            background: #1565c0;
            color: white;
        }
        .backBtn {
            display: block;
            margin-top: 15px;
            background: #555;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="card">

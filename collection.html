<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Collection</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

h2{
text-align:center;
color:#1565c0;
}

p{
font-size:17px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
font-size:17px;
}

</style>

</head>

<body>

<div class="card">

<h2>Daily Collection</h2>

<p><b>Name:</b> <span id="name"></span></p>

<p><b>Loan:</b> ₹<span id="loan"></span></p>

<p><b>Daily EMI:</b> ₹<span id="emi"></span></p>

<p><b>Remaining:</b> ₹<span id="remaining"></span></p>

<input
type="number"
id="amount"
placeholder="Enter Collection Amount">

<button id="saveBtn">
Save Collection
</button>

</div>

<script type="module" src="collection.js"></script>

</body>
</html>

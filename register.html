<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDA Finance - Add Customer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; padding: 20px; background: #eef3f8; font-family: Arial, sans-serif; }
        .card { max-width: 450px; margin: auto; background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,.15); }
        .heading { text-align: center; font-size: 24px; margin-bottom: 20px; color: #1565c0; font-weight: bold; }
        input, select { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; box-sizing: border-box; }
        
        /* कैमरा और फोटो प्रीव्यू सेक्शन */
        .camera-box { text-align: center; margin-bottom: 15px; background: #f5f7fb; padding: 10px; border-radius: 10px; border: 1px dashed #1565c0; }
        #video { width: 100%; max-height: 250px; background: #000; border-radius: 8px; display: block; }
        #canvas { display: none; width: 100%; border-radius: 8px; }
        .cam-btn { background: #1565c0; color: white; border: none; padding: 10px 15px; font-size: 14px; border-radius: 6px; cursor: pointer; margin-top: 8px; font-weight: bold; }
        
        button.save-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; background: #28a745; color: white; }
        .backBtn { display: block; margin-top: 15px; background: #555; color: white; text-decoration: none; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="heading">👤 नया ग्राहक पंजीकरण</div>

        <div class="camera-box">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <button type="button" id="captureBtn" class="cam-btn">📸 फोटो खींचें (Capture)</button>
            <button type="button" id="reTakeBtn" class="cam-btn" style="display:none; background:#dc3545;">🔄 दोबारा खींचें</button>
        </div>

        <form id="registerForm" onsubmit="return false;">
            <input type="text" id="customerName" placeholder="ग्राहक का नाम (Customer Name)" required>
            <input type="number" id="mobileNumber" placeholder="मोबाइल नंबर (Mobile Number)" required>
            <input type="text" id="address" placeholder="पूरा पता (Address)" required>
            <input type="number" id="aadhaarNumber" placeholder="आधार कार्ड नंबर (Aadhaar Number)" required>
            
            <input type="number" id="loanAmount" placeholder="लोन राशि (Loan Amount)" required>

            <select id="loanPlan" required>
                <option value="60" selected>60 Days Plan</option>
            </select>

            <label style="font-size: 14px; color: #555; font-weight: bold;">कुल कलेक्शन (Total Collection):</label>
            <input type="number" id="remainingAmount" placeholder="Total Collection" readonly style="background: #e9ecef; font-weight: bold; color: #1565c0;">

            <label style="font-size: 14px; color: #555; font-weight: bold;">रोजाना किस्त (Daily EMI):</label>
            <input type="number" id="emi" placeholder="Daily EMI" readonly style="background: #e9ecef; font-weight: bold; color: #28a745;">

            <button type="button" id="saveBtn" class="save-btn">💰 ग्राहक सुरक्षित करें</button>
            <a href="customer-list.html" class="backBtn">⬅ ग्राहक लिस्ट में वापस जाएं</a>
        </form>
    </div>

    <script type="module" src="register.js"></script>
</body>
</html>

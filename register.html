<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Registration - GDA Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #eef3f8; padding: 15px; margin: 0; color: #1e293b; }
        .card { max-width: 480px; margin: auto; background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,.08); }
        h2 { text-align: center; color: #1565c0; margin-bottom: 20px; font-weight: 700; }
        label { font-weight: 600; color: #475569; display: block; margin-top: 14px; margin-bottom: 6px; font-size: 13px; text-transform: uppercase; }
        input { width: 100%; padding: 11px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; background: #f8fafc; margin-bottom: 10px; }
        .btn-submit { background: #1565c0; color: white; border: none; padding: 13px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>👤 New Customer Registration</h2>
        <form id="regForm">
            
            <label>CUSTOMER NAME:</label>
            <input type="text" id="customerName" placeholder="Enter full name" required>

            <label>MOBILE NUMBER:</label>
            <input type="text" id="mobileNumber" placeholder="Enter mobile number" required>

            <label>COMPLETE ADDRESS:</label>
            <input type="text" id="address" placeholder="Enter address details" required>

            <!-- कैमरा ऑप्शंस जोड़े गए -->
            <label>📷 CAPTURE CUSTOMER PHOTO:</label>
            <input type="file" id="customerPhotoFile" accept="image/*" capture="user">

            <label>📷 UPLOAD AADHAAR CARD (LIVE CAMERA):</label>
            <input type="file" id="docAadharFile" accept="image/*" capture="environment">

            <label>📄 UPLOAD PAN CARD (LIVE CAMERA):</label>
            <input type="file" id="docPanFile" accept="image/*" capture="environment">

            <label>AADHAAR NUMBER:</label>
            <input type="text" id="aadhaarNumber" placeholder="Enter 12-digit Aadhaar">

            <label>PAN CARD NUMBER:</label>
            <input type="text" id="panNumber" placeholder="ENTER PAN NUMBER">

            <label>LOAN AMOUNT (₹):</label>
            <input type="number" id="loanAmount" placeholder="Enter loan amount" required>

            <label>PLAN DURATION (DAYS):</label>
            <input type="number" id="loanPlan" placeholder="Enter duration" required>

            <label>DAILY EMI AMOUNT (₹):</label>
            <input type="number" id="emi" placeholder="Enter EMI" required>

            <label>LOAN DISBURSED DATE:</label>
            <input type="date" id="loanDate" required>

            <button type="submit" class="btn-submit" id="regBtn">💾 Save Registration</button>
        </form>
    </div>

    <script type="module" src="register.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration - GDA Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; margin: 0; padding: 15px; color: #1e293b; }
        .form-container { max-width: 450px; margin: auto; background: #ffffff; border-radius: 20px; padding: 25px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #0256c4; margin-bottom: 25px; font-size: 20px; }
        label { font-weight: 700; color: #475569; display: block; margin-top: 15px; font-size: 11px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; margin-top: 6px; background: #f8fafc; font-size: 14px; }
        .readonly-input { background: #e2e8f0; font-weight: bold; color: #334155; }
        .btn-submit { background: #0256c4; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 600; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 id="formTitle">👤 New Customer Registration</h2>
    <form id="regForm">
        <label>CUSTOMER NAME:</label>
        <input type="text" id="customerName" required>

        <label>MOBILE NUMBER:</label>
        <input type="tel" id="mobileNumber" pattern="[0-9]{10}" maxlength="10" required>

        <label>COMPLETE ADDRESS:</label>
        <input type="text" id="address" required>

        <label>AADHAAR NUMBER:</label>
        <input type="text" id="aadhaarNumber" placeholder="Enter 12-digit number" maxlength="12">

        <label>PAN CARD NUMBER:</label>
        <input type="text" id="panNumber" maxlength="10" style="text-transform:uppercase;">

        <label>LOAN AMOUNT (₹):</label>
        <input type="number" id="loanAmount" required>

        <label>PLAN DURATION (DAYS):</label>
        <select id="loanPlan">
            <option value="60">60 Days</option>
            <option value="80">80 Days</option>
        </select>

        <label>TOTAL AMOUNT TO PAY (₹):</label>
        <input type="number" id="totalAmount" class="readonly-input" readonly>

        <label>DAILY EMI AMOUNT (₹):</label>
        <input type="number" id="emi" class="readonly-input" readonly>

        <label>LOAN DISBURSED DATE:</label>
        <input type="date" id="loanDate" required>

        <button type="submit" class="btn-submit" id="regBtn">Save Registration</button>
    </form>
</div>

<script type="module" src="register.js"></script>
</body>
</html>

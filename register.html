<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Registration</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>👤 Customer Registration</h1>
<p>नया ग्राहक जोड़ें</p>
</header>

<div class="container">

<div class="card">

<input type="text" id="name" placeholder="ग्राहक का नाम">

<input type="text" id="mobile" placeholder="मोबाइल नंबर">

<input type="text" id="address" placeholder="पूरा पता">

<input type="number" id="loan" placeholder="Loan Amount">

<input type="number" id="emi" placeholder="Daily EMI">
<input type="text" id="customerId" placeholder="Customer ID" readonly>
<input type="number" id="days" value="60" readonly>

<input type="date" id="loanDate">

<input type="text" id="status" value="Active" readonly>

<button id="saveBtn">💾 Save Customer</button>

<br><br>

<button onclick="location.href='customer-list.html'">
📋 Customer List
</button>

<br><br>

<button onclick="location.href='index.html'">
🏠 Dashboard
</button>

</div>

</div>

<script type="module" src="register.js"></script>

</body>
</html>

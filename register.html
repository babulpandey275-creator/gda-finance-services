<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration | GDA Finance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3a1c62;
            --secondary: #e91e63;
            --accent: #FFC107;
            --success: #10b981;
            --danger: #d32f2f;
            --bg-gradient: #fce4ec;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #3a1c62;
            --text-muted: #6d5b85;
        }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-gradient); 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
        }
        .card { 
            max-width: 500px; 
            margin: auto; 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 4px 12px rgba(58, 28, 98, 0.15);
            border: 1px solid #f0e6f6;
        }
        label { 
            font-weight: 600; 
            display: block; 
            margin-top: 15px; 
            font-size: 13px; 
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #e1bee7; 
            border-radius: 10px; 
            font-size: 14px;
            background: #faf7fc;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(58, 28, 98, 0.1);
        }
        input[readonly] {
            background: #f0ecf3;
            color: var(--text-muted);
        }
        .btn { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary);
            color: white; 
            border: none; 
            border-radius: 10px; 
            margin-top: 20px; 
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        .photo-box { text-align: center; margin-bottom: 20px; }
        .photo-preview { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 3px solid var(--primary); 
            object-fit: cover; 
            background: white;
        }
        .photo-box label { 
            background: var(--primary);
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            display: inline-block; 
            margin-top: 10px; 
            font-size: 14px;
            font-weight: 600;
            text-transform: none;
        }
    </style>
</head>
<body>

<div class="card">
    <form id="regForm">
        <div class="photo-box">
            <img src="https://via.placeholder.com/120" id="photoPreview" class="photo-preview">
            <br>
            <label for="customerPhoto">
                <i class="fa fa-camera"></i> Take Photo
                <input type="file" id="customerPhoto" accept="image/*" capture="environment" hidden>
            </label>
        </div>

        <label>CUSTOMER NAME</label>
        <input type="text" id="customerName" required>

        <label>MOBILE NUMBER</label>
        <input type="tel" id="mobile" maxlength="10" required>

        <!-- 🔥 पिता/पति का नाम (Guardian) -->
        <label>👨‍👦 पिता / पति का नाम (FATHER/HUSBAND)</label>
        <input type="text" id="guardianName" placeholder="पिता या पति का पूरा नाम" required>

        <!-- 🔥🔥🔥 AADHAAR NUMBER – अब Editable (बदलने योग्य) है -->
        <label>🆔 AADHAAR NUMBER</label>
        <input type="text" id="aadhaar" placeholder="12 अंकों का आधार नंबर (बिना स्पेस)" required>

        <label>PAN CARD NUMBER</label>
        <input type="text" id="panNumber" style="text-transform:uppercase;">

        <label>💰 LOAN AMOUNT (₹)</label>
        <input type="number" id="loanAmount" required>

        <label>📅 PLAN DURATION</label>
        <select id="loanPlan">
            <option value="60">60 Days</option>
            <option value="80">80 Days</option>
        </select>

        <label>💰 TOTAL PAYABLE (₹)</label>
        <input type="number" id="totalPayable" readonly style="background:#eee;">

        <label>📆 DAILY COLLECTION (₹)</label>
        <input type="number" id="dailyCollection" readonly style="background:#eee;">

        <button type="submit" class="btn" id="regBtn">💾 Save Registration</button>
    </form>
</div>

<script type="module" src="register.js"></script>
</body>
</html>

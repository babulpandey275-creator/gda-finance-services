<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Documents - GDA Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #eef3f8; padding: 20px; color: #1e293b; }
        .card { max-width: 450px; margin: auto; background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1565c0; margin-bottom: 25px; }
        label { font-weight: 600; color: #475569; display: block; margin-top: 15px; font-size: 13px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; background: #f8fafc; }
        .btn-save { background: #10b981; color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        .btn-back { display: block; text-align: center; background: #64748b; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📸 Manage Documents</h2>
        <label>📷 Aadhaar Card (Live Camera):</label>
        <input type="file" id="docAadharFile" accept="image/*" capture="environment">
        
        <label>📄 PAN Card (Live Camera):</label>
        <input type="file" id="docPanFile" accept="image/*" capture="environment">
        
        <button id="uploadDocsBtn" class="btn-save">💾 Save Documents</button>
        <a href="customer-list.html" class="btn-back">⬅ Back to List</a>
    </div>
    <script type="module" src="documents.js"></script>
</body>
</html>

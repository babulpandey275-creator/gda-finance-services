<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - GDA Finance Services</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial,sans-serif;
}

.login-box{
    background:#fff;
    width:340px;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    color:#0b57d0;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0b57d0;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0847a6;
}

#error{
    color:red;
    text-align:center;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="login-box">

<h2>🔐 Admin Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<script src="login.js"></script>

</body>
</html>

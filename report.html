<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <style>
        /* ===== सिर्फ रंग (Colors) बदले गए हैं – बाकी सब आपका पुराना कोड ===== */
        :root {
            --primary: #3a1c62;
            --secondary: #e91e63;
            --accent: #FFC107;
            --success: #10b981;
            --danger: #d32f2f;
            --bg-gradient: #fce4ec;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #3a1c62;
            --text-muted: #6d5b85;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; padding-bottom: 80px; }
        
        /* Header – सिर्फ रंग बदला */
        .app-header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .app-header h1 { font-size: 22px; font-weight: 700; }
        .app-header a { color: white; text-decoration: none; font-size: 14px; }
        .app-header small { font-size: 13px; font-weight: 400; opacity: 0.8; }

        /* बाकी सब आपका पुराना कोड – बिल्कुल वैसा ही */
        .container { padding: 15px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .report-box { background: white; padding: 16px; border-radius: 12px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .report-box.full { grid-column: span 2; }
        .report-box p { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin: 0; }
        .report-box h3 { font-size: 18px; margin-top: 4px; color: var(--text-main); font-weight: 700; }
        .report-box.positive h3 { color: var(--success); }
        .report-box.negative h3 { color: var(--danger); }
        .report-box.primary h3 { color: var(--primary); }

        /* Bottom Nav – सिर्फ रंग बदला */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: white; display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid #e1bee7; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #94a3b8; font-size: 11px; }
        .nav-item.active { color: var(--secondary); font-weight: 600; }
        .nav-item .material-symbols-outlined { font-size: 24px; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="app-header">
        <div>
            <h1>📊 Financial Reports</h1>
            <small id="reportDate">Month: 07/17/2026</small>
        </div>
        <a href="index.html">← Home</a>
    </header>

    <!-- Content -->
    <div class="container">
        <div class="report-grid">
            <div class="report-box full primary">
                <p>TOTAL PORTFOLIO (MARKET RUNNING)</p>
                <h3 id="totalPortfolio">₹0</h3>
            </div>
            <div class="report-box"><p>DISBURSEMENT</p><h3 id="totalDisbursement">₹0</h3></div>
            <div class="report-box positive"><p>COLLECTION</p><h3 id="totalCollection">₹0</h3></div>
            <div class="report-box positive"><p>INTEREST INCOME</p><h3 id="totalInterest">₹0</h3></div>
            <div class="report-box negative"><p>TOTAL EXPENSES</p><h3 id="totalExpenses">₹0</h3></div>
            <div class="report-box positive"><p>NET PROFIT</p><h3 id="netProfit">₹0</h3></div>
            <div class="report-box negative"><p>TOTAL DUE</p><h3 id="totalDue">₹0</h3></div>
            <div class="report-box"><p>NEW ACCOUNTS</p><h3 id="newAccounts">0</h3></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="material-symbols-outlined">home</span>Home</a>
        <a href="customer-list.html" class="nav-item"><span class="material-symbols-outlined">group</span>Customers</a>
        <a href="collection.html" class="nav-item"><span class="material-symbols-outlined">paid</span>Collect</a>
        <a href="report.html" class="nav-item active"><span class="material-symbols-outlined">analytics</span>Reports</a>
        <a href="#" id="logoutBtn" class="nav-item" style="color:var(--danger);"><span class="material-symbols-outlined">logout</span>Logout</a>
    </nav>

    <script type="module" src="report.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>

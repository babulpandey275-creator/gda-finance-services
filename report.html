<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Reports - GDA Finance</title>
    <style>
        body{margin:0;padding:20px;background:#eef3f8;font-family:Arial,sans-serif;}
        .card{max-width:500px;margin:auto;background:#fff;border-radius:15px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,.15);}
        .heading{text-align:center;font-size:22px;margin-bottom:20px;color:#1565c0;font-weight:bold;}
        .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:20px;}
        .tab-btn{padding:10px 4px;background:#e2e8f0;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:12px;text-align:center;}
        .tab-btn.active{background:#1565c0;color:white;}
        .date-picker-box{background:#f1f5f9;padding:12px;border-radius:10px;margin-bottom:15px;text-align:center;display:none;border:1px solid #cbd5e1;}
        .date-picker-box label{font-weight:bold;font-size:13px;color:#475569;margin-right:8px;}
        .date-picker-box input{padding:8px;font-size:14px;border-radius:6px;border:1px solid #cbd5e1;font-weight:bold;text-align:center;}
        .stats-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:15px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;}
        .stats-left p{margin:0;font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;}
        .stats-left h2{margin:5px 0 0 0;font-size:20px;color:#0f172a;}
        .icon{font-size:24px;}
        .back-btn{display:block;text-align:center;background:#475569;color:white;padding:12px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:20px;}
        .manage-exp-btn{display:block;text-align:center;background:#dc3545;color:white;padding:12px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:10px;}
    </style>
</head>
<body>
<div class="card">
    <div class="heading">📊 वित्तीय रिपोर्ट (Financial Reports)</div>
    
    <div class="tabs">
        <button class="tab-btn active" id="btnDaily">Daily</button>
        <button class="tab-btn" id="btnMonthly">Monthly</button>
        <button class="tab-btn" id="btnQuarterly">Quarterly</button>


<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Add Customer - GDA Finance</title><style>body{margin:0;padding:20px;background:#eef3f8;font-family:Arial,sans-serif;}.card{max-width:450px;margin:auto;background:#fff;border-radius:15px;padding:24px;box-shadow:0 5px 15px rgba(0,0,0,.15);}.title{font-size:22px;font-weight:bold;color:#1565c0;text-align:center;margin-bottom:20px;}.input-group{margin-bottom:15px;}.input-group label{display:block;font-size:14px;font-weight:bold;color:#334155;margin-bottom:5px;}.input-group input,.input-group select{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;font-size:15px;box-sizing:border-box;}.btn-save{width:100%;padding:12px;background:#22c55e;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold;margin-top:10px;}.btn-back{width:100%;padding:12px;background:#475569;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold;margin-top:10px;text-align:center;text-decoration:none;display:block;box-sizing:border-box;}</style></head><body><div class="card"><div class="title">➕ नया ग्राहक जोड़ें (Add Customer)</div><div class="input-group"><label>👤 ग्राहक का नाम:</label><input type="text" id="custName" placeholder="पूरा नाम दर्ज करें"></div><div class="input-group"><label>📞 मोबाइल नंबर:</label><input type="number" id="custMobile" placeholder="10 अंकों का मोबाइल नंबर"></div><div class="input-group"><label>📍 स्थायी पता:</label><input type="text" id="custAddress" placeholder="पता दर्ज करें"></div><div class="input-group"><label>📸 ग्राहक फोटो URL:</label><input type="text" id="custPhoto" placeholder="https://example.com/photo.jpg"></div><div class="input-group"><label>🪪 आधार कार्ड संख्या:</label><input type="number" id="custAadhaar" placeholder="12 अंकों का आधार नंबर"></div><div class="input-group"><label>💳 पैन कार्ड संख्या:</label><input type="text" id="custPan" placeholder="10 अंकों का PAN नंबर" style="text-transform:uppercase;"></div><div class="input-group"><label>💵 लोन राशि (₹):</label><input type="number" id="custLoan" placeholder="जैसे: 10000"></div><div class="input-group"><label>📅 प्लान अवधि (दिन):</label><input type="number" id="custPlan" placeholder="जैसे: 100"></div><div class="input-group"><label>📦 दैनिक EMI किस्त (₹):</label><input type="number" id="custEmi" placeholder="जैसे: 100"></div><div class="input-group"><label>🗓️ लोन की तारीख:</label><input type="date" id="custDate"></div><button id="btnSaveCustomer" class="btn-save">Save Customer</button><a href="customer-list.html" class="btn-back">Back to List</a></div><script type="module" src="add-customer.js"></script></body></html>

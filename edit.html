<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer - GDA Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Poppins',sans-serif;background:#eef3f8;padding:15px;margin:0;}
        .card{max-width:480px;margin:auto;background:#fff;border-radius:20px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.08);}
        h2{text-align:center;color:#1565c0;margin-bottom:20px;}
        label{font-weight:600;color:#475569;display:block;margin-top:12px;margin-bottom:6px;font-size:14px;}
        input,select{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;box-sizing:border-box;font-size:14px;}
        .btn-submit{background:#1565c0;color:white;border:none;padding:12px;width:100%;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:20px;font-size:16px;}
        .btn-delete{background:#ef4444;color:white;border:none;padding:12px;width:100%;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:12px;font-size:16px;}
    </style>
</head>
<body>
    <div class="card">
        <h2>📝 Edit Customer Details</h2>
        <form id="editForm">
            <label>👤 ग्राहक का नाम:</label><input type="text" id="customerName">
            <label>📞 मोबाइल नंबर:</label><input type="text" id="mobileNumber">
            <label>📍 स्थायी पता:</label><input type="text" id="address">
            <label>📷 ग्राहक फोटो URL:</label><input type="text" id="customerPhoto">
            <label>💳 आधार कार्ड संख्या:</label><input type="text" id="aadhaarNumber">
            <label>📇 पैन कार्ड संख्या:</label><input type="text" id="panNumber">
            <label>💵 लोन राशि (₹):</label><input type="number" id="loanAmount">
            <label>📅 प्लान अवधि (Days):</label><input type="number" id="loanPlan">
            <label>📦 दैनिक EMI किस्त (₹):</label><input type="number" id="emi">
            <label>📆 लोन की तारीख:</label><input type="date" id="loanDate">
            
            <button type="submit" class="btn-submit" id="saveBtn">💰 अपडेट सुरक्षित करें</button>
            <button type="button" class="btn-delete" id="deleteBtn">🗑️ ग्राहक डिलीट करें</button>
        </form>
    </div>
    <script type="module" src="edit.js"></script>
</body>
</html>

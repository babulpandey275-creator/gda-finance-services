<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer - GDA Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #eef3f8; padding: 15px; margin: 0; color: #1e293b; }
        .card { max-width: 480px; margin: auto; background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,.08); }
        h2 { text-align: center; color: #1565c0; margin-bottom: 20px; font-weight: 700; }
        label { font-weight: 600; color: #475569; display: block; margin-top: 14px; margin-bottom: 6px; font-size: 13px; text-transform: uppercase; }
        input { width: 100%; padding: 11px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; background: #f8fafc; margin-bottom: 10px; }
        .btn-submit { background: #1565c0; color: white; border: none; padding: 13px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 13px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 12px; }
        .btn-docs { display: block; text-align: center; background: #475569; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; }
        .btn-back { display: block; text-align: center; background: #64748b; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📝 Edit Customer Details</h2>
        <form id="editForm">
            
            <label>👤 Customer Name:</label>
            <input type="text" id="customerName" required>

            <label>📞 Mobile Number:</label>
            <input type="text" id="mobileNumber" required>

            <label>📍 Permanent Address:</label>
            <input type="text" id="address" required>

            <label>📷 Capture Customer Photo:</label>
            <input type="file" id="customerPhotoFile" accept="image/*" capture="user">

            <label>💳 Aadhaar Number:</label>
            <input type="text" id="aadhaarNumber" value="[Aadhaar Redacted]" readonly>

            <label>📇 PAN Card Number:</label>
            <input type="text" id="panNumber">

            <label>💵 Loan Amount (₹):</label>
            <input type="number" id="loanAmount" required>

            <label>📅 Plan Duration (Days):</label>
            <input type="number" id="loanPlan" required>

            <!-- नया ऑटो-कैलकुलेटेड बॉक्स -->
            <label>📦 Total Amount to Pay (₹):</label>
            <input type="number" id="totalAmount" readonly style="background: #e2e8f0; font-weight: bold;">

            <label>📦 Daily EMI Amount (₹):</label>
            <input type="number" id="emi" required>

            <label>📆 Loan Disbursed Date:</label>
            <input type="date" id="loanDate" required>

            <button type="submit" class="btn-submit" id="saveBtn">💾 Update & Save Records</button>
            <a href="documents.html" id="manageDocsBtn" class="btn-docs">📸 Manage Aadhaar & PAN Photos</a>
            <button type="button" class="btn-delete" id="deleteBtn">🗑️ Delete This Customer</button>
            <a href="customer-list.html" class="btn-back">⬅ Cancel & Go Back</a>
        </form>
    </div>

    <script type="module" src="edit.js"></script>
</body>
</html>

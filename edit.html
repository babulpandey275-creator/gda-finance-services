<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer - GDA Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #eef3f8;
            padding: 15px;
            margin: 0;
            color: #1e293b;
        }
        .card {
            max-width: 480px;
            margin: auto;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,.08);
        }
        h2 {
            text-align: center;
            color: #1565c0;
            margin-bottom: 20px;
            font-weight: 700;
        }
        label {
            font-weight: 600;
            color: #475569;
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background: #f8fafc;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #1565c0;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.15);
        }
        .file-input-wrapper {
            position: relative;
            margin-bottom: 5px;
        }
        .btn-submit {
            background: #1565c0;
            color: white;
            border: none;
            padding: 13px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(21, 101, 192, 0.2);
            transition: 0.2s;
        }
        .btn-submit:hover {
            background: #0d47a1;
        }
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 13px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn-delete:hover {
            background: #dc3545;
        }
        .btn-back {
            display: block;
            text-align: center;
            background: #475569;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>📝 Edit Customer Details</h2>
        <form id="editForm">
            
            <label>👤 Customer Name:</label>
            <input type="text" id="customerName" placeholder="Enter full name" required>

            <label>📞 Mobile Number:</label>
            <input type="text" id="mobileNumber" placeholder="Enter mobile number" required>

            <label>📍 Permanent Address:</label>
            <input type="text" id="address" placeholder="Enter complete address" required>

            <label>📷 Customer Profile Photo URL:</label>
            <input type="text" id="customerPhoto" placeholder="Image link or storage path">

            <label>💳 Aadhaar Number:</label>
            <input type="text" id="aadhaarNumber" placeholder="Enter Aadhaar details">

            <label>📇 PAN Card Number:</label>
            <input type="text" id="panNumber" placeholder="Enter PAN number">

            <label>💵 Loan Amount (₹):</label>
            <input type="number" id="loanAmount" placeholder="Example: 10000" required>

            <label>📅 Plan Duration (Days):</label>
            <input type="number" id="loanPlan" placeholder="Example: 60" required>

            <label>📦 Daily EMI Amount (₹):</label>
            <input type="number" id="emi" placeholder="Example: 200" required>

            <label>📆 Loan Disbursed Date:</label>
            <input type="date" id="loanDate" required>

            <!-- 📸 नया हाई-टेक कैमरा इनपुट: आधार कार्ड फोटो -->
            <label>🪪 Upload Aadhaar Card (Live Camera):</label>
            <div class="file-input-wrapper">
                <input type="file" id="docAadharFile" accept="image/*" capture="environment">
            </div>

            <!-- 📸 नया हाई-टेक कैमरा इनपुट: पैन/वोटर कार्ड फोटो -->
            <label>📄 Upload PAN / Voter Card (Live Camera):</label>
            <div class="file-input-wrapper">
                <input type="file" id="docPanFile" accept="image/*" capture="environment">
            </div>

            <!-- बटन एक्शन्स -->
            <button type="submit" class="btn-submit" id="saveBtn">💾 Update & Save Records</button>
            <button type="button" class="btn-delete" id="deleteBtn">🗑️ Delete This Customer</button>
            <a href="customer-list.html" class="btn-back">⬅ Cancel & Go Back</a>
        </form>
    </div>

    <script type="module" src="edit.js"></script>
</body>
</html>

<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Edit Customer - GDA Finance</title><style>body{margin:0;padding:20px;background:#eef3f8;font-family:Arial,sans-serif;}.card{max-width:450px;margin:auto;background:#fff;border-radius:15px;padding:24px;box-shadow:0 5px 15px rgba(0,0,0,.15);}.title{font-size:22px;font-weight:bold;color:#1565c0;text-align:center;margin-bottom:20px;}.input-group{margin-bottom:15px;}.input-group label{display:block;font-size:14px;font-weight:bold;color:#334155;margin-bottom:5px;}.input-group input,.input-group select{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;font-size:15px;box-sizing:border-box;}.btn-save{width:100%;padding:12px;background:#1565c0;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold;margin-top:10px;}</style></head><body><div class="card"><div class="title">📝 Edit Customer Details</div><div class="input-group"><label>👤 ग्राहक का नाम:</label><input type="text" id="editName"></div><div class="input-group"><label>📞 मोबाइल नंबर:</label><input type="number" id="editMobile"></div><div class="input-group"><label>📍 स्थायी पता:</label><input type="text" id="editAddress"></div><div class="input-group"><label>📸 ग्राहक फोटो URL:</label><input type="text" id="editPhoto" placeholder="https://example.com/photo.jpg"></div><div class="input-group"><label>🪪 आधार कार्ड संख्या:</label><input type="number" id="editAadhaar" placeholder="12 अंकों का नया नंबर दर्ज करें"></div><div class="input-group"><label>💳 पैन कार्ड संख्या:</label><input type="text" id="editPan" placeholder="नया PAN नंबर दर्ज करें" style="text-transform:uppercase;"></div><div class="input-group"><label>💵 लोन राशि (₹):</label><input type="number" id="editLoan"></div><div class="input-group"><label>📦 दैनिक EMI किस्त (₹):</label><input type="number" id="editEmi"></div><div class="input-group"><label>🔻 शेष बकाया राशि (₹):</label><input type="number" id="editRemaining"></div><div class="input-group"><label>🗓️ लोन की तारीख:</label><input type="date" id="editDate"></div><button id="btnSaveChanges" class="btn-save">Save Changes</button></div><script type="module" src="edit.js"></script></body></html>

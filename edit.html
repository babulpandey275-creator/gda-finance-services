<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer - GDA Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #eef3f8; padding: 20px; color: #1e293b; }
        .card { max-width: 450px; margin: auto; background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,.08); }
        h2 { text-align: center; color: #1565c0; margin-bottom: 20px; }
        label { font-weight: 600; color: #475569; display: block; margin-top: 12px; font-size: 12px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; margin-top: 5px; background: #f8fafc; }
        .readonly-input { background: #e2e8f0; font-weight: bold; }
        .btn-submit { background: #1565c0; color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 25px; }
    </style>
</head>
<body>

<div class="card">
    <h2>✏️ Edit Customer</h2>
    <form id="editForm">
        <label>CUSTOMER NAME:</label>
        <input type="text" id="customerName" required>

        <label>MOBILE NUMBER:</label>
        <input type="tel" id="mobileNumber" pattern="[0-9]{10}" maxlength="10" required>

        <label>COMPLETE ADDRESS:</label>
        <input type="text" id="address" required>

        <label>AADHAAR NUMBER:</label>
        <input type="text" id="aadhaarNumber" placeholder="[Aadhaar Redacted]" maxlength="12">

        <label>PAN CARD NUMBER:</label>
        <input type="text" id="panNumber" maxlength="10" style="text-transform:uppercase;">

        <label>LOAN AMOUNT (₹):</label>
        <input type="number" id="loanAmount" required>

        <label>PLAN DURATION (DAYS):</label>
        <select id="loanPlan">
            <option value="60">60 Days</option>
            <option value="80">80 Days</option>
        </select>

        <label>TOTAL AMOUNT TO PAY (₹):</label>
        <input type="number" id="totalAmount" class="readonly-input" readonly>

        <label>DAILY EMI AMOUNT (₹):</label>
        <input type="number" id="emi" class="readonly-input" readonly>

        <label>LOAN DISBURSED DATE:</label>
        <input type="date" id="loanDate" required>

        <button type="submit" class="btn-submit" id="updateBtn">💾 Update Profile</button>
    </form>
</div>

<script type="module" src="edit.js"></script>
</body>
</html>

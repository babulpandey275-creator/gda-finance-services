<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>गाहक प्रबंधन</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <style>
        /* ===== सिर्फ रंग (Colors) और हेडर (Header) का स्टाइल (Style) बदला गया है – बाकी सब आपका पुराना कोड ===== */
        :root {
            --primary: #3a1c62;
            --secondary: #e91e63;
            --accent: #FFC107;
            --success: #10b981;
            --danger: #d32f2f;
            --bg-gradient: #fce4ec;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #3a1c62;
            --text-muted: #6d5b85;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; padding-bottom: 80px; }
        
        /* ===== 🔥 नया (New) हेडर (Header) – बिल्कुल Dashboard (index.html) जैसा ===== */
        .app-header { 
            background: var(--primary); 
            color: white; 
            padding: 20px 15px; 
            border-bottom-left-radius: 24px; 
            border-bottom-right-radius: 24px; 
            box-shadow: 0 4px 20px rgba(58, 28, 98, 0.2); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .gda-logo-container { display: flex; align-items: center; gap: 14px; }
        .gda-logo-icon { 
            width: 52px; 
            height: 52px; 
            border-radius: 16px; 
            background: var(--secondary); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border: 2px solid rgba(255,255,255,.35); 
        }
        .gda-logo-icon .material-symbols-outlined { font-size: 30px; color: #FFFFFF; }
        .gda-logo-text h1 { 
            margin: 0; 
            font-size: 28px; 
            font-weight: 800; 
            line-height: 1; 
            color: #FFFFFF; 
        }
        .gda-logo-text p { 
            margin-top: 4px; 
            font-size: 11px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: #FFD700; 
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.2); 
            color: white; 
            border: none; 
            padding: 8px 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 12px; 
            text-decoration: none;
        }
        /* ======================================================== */

        /* बाकी सब आपका पुराना कोड – बिल्कुल वैसा ही */
        .container { padding: 15px; }
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .filter-tab { padding: 8px 16px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; font-size: 13px; }
        .filter-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 14px; }
        
        .cust-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .cust-card .info { display: flex; gap: 12px; align-items: center; cursor: pointer; }
        .cust-card .info img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .cust-card .info h4 { font-size: 16px; font-weight: 600; margin: 0; }
        .cust-card .info p { font-size: 12px; color: #666; margin: 2px 0; }
        .cust-card .actions { display: flex; gap: 8px; margin-top: 10px; }
        .cust-card .actions a, .cust-card .actions button { 
            flex: 1; text-align: center; padding: 8px; border-radius: 8px; 
            text-decoration: none; font-size: 12px; font-weight: 700; border: none; cursor: pointer; 
        }
        .btn-collect { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; }
        .btn-edit { background: var(--accent); color: black; }

        /* Bottom Nav – सिर्फ रंग बदला */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: white; display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid #e1bee7; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #94a3b8; font-size: 11px; }
        .nav-item.active { color: var(--secondary); font-weight: 600; }
        .nav-item .material-symbols-outlined { font-size: 24px; }
    </style>
</head>
<body>

    <!-- ===== 🔥 नया (New) हेडर (Header) – बिल्कुल Dashboard (index.html) जैसा ===== -->
    <header class="app-header">
        <div class="gda-logo-container">
            <div class="gda-logo-icon"><span class="material-symbols-outlined">shield_with_heart</span></div>
            <div class="gda-logo-text">
                <h1>GDA</h1>
                <p>Finance Services</p>
            </div>
        </div>
        <a href="index.html" class="back-btn">← Back</a>
    </header>

    <!-- Content (बिल्कुल आपका पुराना) -->
    <div class="container">
        <div class="filter-tabs">
            <span class="filter-tab active" onclick="filterCustomers('active')">Active Accounts</span>
            <span class="filter-tab" onclick="filterCustomers('closed')">Closed Accounts</span>
        </div>

        <input type="text" id="searchInp" class="search-box" placeholder="🔍 नाम या मोबाइल नंबर से खोजें...">

        <div id="listContainer"></div>
    </div>

    <!-- Bottom Nav (बिल्कुल आपका पुराना) -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="material-symbols-outlined">home</span>Home</a>
        <a href="customer-list.html" class="nav-item active"><span class="material-symbols-outlined">group</span>Customers</a>
        <a href="collection.html" class="nav-item"><span class="material-symbols-outlined">paid</span>Collect</a>
        <a href="report.html" class="nav-item"><span class="material-symbols-outlined">analytics</span>Reports</a>
        <a href="#" id="logoutBtn" class="nav-item" style="color:var(--danger);"><span class="material-symbols-outlined">logout</span>Logout</a>
    </nav>

    <script type="module" src="customer-list.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>

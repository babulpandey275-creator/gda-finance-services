<!DOCTYPE html>
<html lang="hi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Statement</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:15px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

h1{
text-align:center;
color:#1565c0;
margin-bottom:5px;
}

h3{
text-align:center;
color:#444;
margin-top:0;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th,
table td{
border:1px solid #ccc;
padding:8px;
text-align:center;
font-size:15px;
}

table th{
background:#1565c0;
color:#fff;
}

.info p{
margin:8px 0;
font-size:16px;
}

.btn{
width:100%;
padding:14px;
margin-top:12px;
font-size:17px;
border:none;
border-radius:8px;
cursor:pointer;
color:#fff;
}

.whatsapp{
background:#25D366;
}

.print{
background:#1565c0;
}

.back{
background:#444;
}

@media print{

button{
display:none;
}

body{
background:white;
}

.card{
box-shadow:none;
border:1px solid #000;
}

}

</style>

<script type="module" src="statement.js"></script>

</head>

<body>

<div class="container">

<div class="card">

<h1>🏦 GDA Finance Services</h1>

<h3>Customer Account Statement</h3>

<div class="info">

<p><b>Customer Name :</b> <span id="name"></span></p>

<p><b>Customer ID :</b> <span id="customerId"></span></p>

<p><b>Mobile :</b> <span id="mobile"></span></p>

<p><b>Address :</b> <span id="address"></span></p>

<p><b>Loan Amount :</b> ₹<span id="loan"></span></p>

<p><b>Daily EMI :</b> ₹<span id="emi"></span></p>

<p><b>Loan Date :</b> <span id="loanDate"></span></p>

<p><b>Total Collected :</b> ₹<span id="totalCollected"></span></p>

<p><b>Remaining Amount :</b> ₹<span id="remaining"></span></p>

<p><b>Paid Days :</b> <span id="paidDays"></span></p>

</div>

<h3>Collection History</h3>

<table>

<thead>

<tr>

<th>S.No</th>

<th>Date</th>

<th>Amount</th>

</tr>

</thead>

<tbody id="historyTable">

</tbody>

</table>

<button class="btn whatsapp" id="shareBtn">
📲 Share on WhatsApp
</button>

<button class="btn print" onclick="window.print()">
🖨 Print / Save PDF
</button>

<button class="btn back" onclick="history.back()">
⬅ Back
</button>

</div>

</div>

</body>

</html>
